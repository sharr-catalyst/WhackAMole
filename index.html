<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Reflex Clicker</title>

    <link href="https://unpkg.com/nes.css@2.3.0/css/nes.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Press Start 2P', monospace;
            text-align: center;
            background-color: #2F4F4F;
            color: #D3D3D3;
            padding: 20px;
            font-size: 12px;
        }

        h1,
        h2 {
            font-family: 'Press Start 2P', monospace;
            color: #fff;
            text-shadow: 3px 3px 0px #000;
            margin-bottom: 20px;
        }

        .stats-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .stat-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #000;
            padding: 10px;
            border: 4px solid #D3D3D3;
        }

        /* Arcade Cabinet Game Box Wrapper */
        #game-box {
            width: 400px;
            height: 400px;
            margin: 20px auto;
            position: relative;
            overflow: hidden;
            background-color: #111;
            /* 8-bit chunky border styling using your palette */
            border: 8px solid #A0522D;
            box-shadow: 0px 12px 0px #000;
        }

        /* Retro Pop-in Animation for targets */
        @keyframes pixelPop {
            0% {
                transform: scale(0);
            }

            100% {
                transform: scale(1);
            }
        }

        /* Arcade Target Button */
        #click-btn {
            position: absolute;
            padding: 12px 16px;
            background-color: #8B0000;
            color: white;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            border: 4px solid #fff;
            cursor: pointer;
            display: none;
            animation: pixelPop 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 6px 0px #000;
        }

        /* Juice: Physical click feedback mechanics */
        #click-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0px #000;
        }

        /* Custom over-rides for elements to match palette */
        .nes-btn.is-success {
            background-color: #228B22 !important;
            color: #fff !important;
        }

        .leaderboard-box {
            max-width: 400px;
            margin: 30px auto;
            background-color: #111 !important;
            text-align: left;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px dashed #D3D3D3;
            padding: 10px 0;
        }

        .leaderboard-item:last-child {
            border-bottom: none;
        }

        .icon-vertical-align {
            vertical-align: middle;
            display: inline-flex;
            align-items: center;
        }
    </style>
</head>

<body>

    <h1><i data-lucide="gamepad-2" class="icon-vertical-align"></i> PYTHON REFLEX</h1>

    <div class="stats-container">
        <div class="stat-badge">
            <i data-lucide="target"></i>
            <span>SCORE:<span id="score-val">0</span></span>
        </div>
        <div class="stat-badge">
            <i data-lucide="timer"></i>
            <span>TIME:<span id="time-val">10</span>s</span>
        </div>
    </div>

    <div id="game-box" class="nes-container">
        <button id="start-btn" class="nes-btn is-success" style="margin-top: 160px;" onclick="startGame()">
            <i data-lucide="play" class="icon-vertical-align"></i> START GAME
        </button>
        <button id="click-btn" onclick="scorePoint()">HIT!</button>
    </div>

    <div class="nes-container is-dark with-title leaderboard-box">
        <p class="title" style="background-color: #2F4F4F;"><i data-lucide="trophy" class="icon-vertical-align"></i> TOP
            5</p>
        <ul id="leaderboard" style="list-style: none; padding: 0; margin: 0;">
        </ul>
    </div>

    <script>
        let score = 0;
        let timeLeft = 10;
        let gameInterval;
        const clickBtn = document.getElementById('click-btn');
        const startBtn = document.getElementById('start-btn');

        function startGame() {
            score = 0;
            timeLeft = 10;
            document.getElementById('score-val').innerText = score;
            document.getElementById('time-val').innerText = timeLeft;
            startBtn.style.display = 'none';
            clickBtn.style.display = 'block';
            moveButton();

            gameInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('time-val').innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(gameInterval);
                    endGame();
                }
            }, 1000);
        }

        function scorePoint() {
            score++;
            document.getElementById('score-val').innerText = score;

            // Core Juice: Force a clone and redraw to trigger pop animation every single bounce
            const clone = clickBtn.cloneNode(true);
            clickBtn.parentNode.replaceChild(clone, clickBtn);

            // Re-assign listeners to the fresh clone element
            clone.addEventListener('click', scorePoint);
            moveButton(clone);
        }

        function moveButton(targetElement = clickBtn) {
            // Adjusted boundaries so the button doesn't clip past the 8px border walls
            const x = Math.random() * (400 - 110);
            const y = Math.random() * (400 - 65);
            targetElement.style.left = `${x}px`;
            targetElement.style.top = `${y}px`;
            targetElement.style.display = 'block';
        }

        async function endGame() {
            // Target elements lookups change due to the cloning structure in execution
            const currentClickBtn = document.getElementById('click-btn');
            currentClickBtn.style.display = 'none';
            startBtn.style.display = 'inline-block';
            startBtn.innerHTML = '<i data-lucide="refresh-cw" class="icon-vertical-align"></i> AGAIN?';
            lucide.createIcons(); // Keep icons crisp on refresh string re-render

            const username = prompt(`GAME OVER!\nFINAL SCORE: ${score}\n\nENTER YOUR INITIALS/NAME:`) || "ANON";

            await fetch('/api/scores', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username.toUpperCase(), score })
            });

            loadLeaderboard();
        }

        async function loadLeaderboard() {
            const response = await fetch('/api/scores');
            const data = await response.json();
            const leaderboard = document.getElementById('leaderboard');
            leaderboard.innerHTML = '';

            data.forEach((entry, idx) => {
                leaderboard.innerHTML += `
                    <li class="leaderboard-item">
                        <span>${idx + 1}. ${entry.username}</span> 
                        <span style="color: #228B22">${entry.score} PTS</span>
                    </li>`;
            });
        }

        // Initialize Lucide vector graphics layer on layout ready
        window.onload = () => {
            loadLeaderboard();
            lucide.createIcons();
        };
    </script>
</body>

</html>
