<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Reflex Clicker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #222;
            color: #fff;
        }

        #game-box {
            width: 400px;
            height: 400px;
            border: 2px solid #555;
            margin: 20px auto;
            position: relative;
            background: #333;
            overflow: hidden;
        }

        #click-btn {
            position: absolute;
            padding: 10px 15px;
            background: #ff4757;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            display: none;
        }

        .menu-btn {
            padding: 10px 20px;
            font-size: 16px;
            background: #2ed573;
            border: none;
            cursor: pointer;
            color: white;
        }

        ul {
            list-style: none;
            padding: 0;
            width: 200px;
            margin: 10px auto;
            text-align: left;
        }

        li {
            background: #444;
            padding: 8px;
            margin: 4px 0;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>

<body>

    <h1>Python Reflex Clicker</h1>
    <p>Score: <span id="score-val">0</span> | Time Left: <span id="time-val">10</span>s</p>

    <div id="game-box">
        <button id="start-btn" class="menu-btn" style="margin-top: 180px;" onclick="startGame()">Start Game</button>
        <button id="click-btn" onclick="scorePoint()">Click Me!</button>
    </div>

    <h2>🏆 Top 5 Leaderboard</h2>
    <ul id="leaderboard"></ul>

    <script>
        let score = 0;
        let timeLeft = 10;
        let gameInterval;
        const clickBtn = document.getElementById('click-btn');
        const startBtn = document.getElementById('start-btn');

        function startGame() {
            score = 0;
            timeLeft = 10;
            document.getElementById('score-val').innerText = score;
            document.getElementById('time-val').innerText = timeLeft;
            startBtn.style.display = 'none';
            clickBtn.style.display = 'block';
            moveButton();

            gameInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('time-val').innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(gameInterval);
                    endGame();
                }
            }, 1000);
        }

        function scorePoint() {
            score++;
            document.getElementById('score-val').innerText = score;
            moveButton();
        }

        function moveButton() {
            const x = Math.random() * (400 - 80);
            const y = Math.random() * (400 - 40);
            clickBtn.style.left = `${x}px`;
            clickBtn.style.top = `${y}px`;
        }

        async function endGame() {
            clickBtn.style.display = 'none';
            startBtn.style.display = 'inline-block';
            startBtn.innerText = "Play Again";

            const username = prompt(`Game over! Your score is ${score}. Enter your name:`) || "Anonymous";

            // POST score to Python API
            await fetch('/api/scores', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, score })
            });

            loadLeaderboard();
        }

        async function loadLeaderboard() {
            // GET scores from Python API
            const response = await fetch('/api/scores');
            const data = await response.json();
            const leaderboard = document.getElementById('leaderboard');
            leaderboard.innerHTML = '';

            data.forEach(entry => {
                leaderboard.innerHTML += `<li><span>${entry.username}</span> <strong>${entry.score}</strong></li>`;
            });
        }

        // Load leaderboard on page load
        window.onload = loadLeaderboard;
    </script>
</body>

</html>
