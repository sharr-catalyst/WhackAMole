<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Reflex Clicker</title>

    <link href="https://unpkg.com/nes.css@2.3.0/css/nes.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Press Start 2P', monospace;
            text-align: center;
            background-color: #00194C;
            /* Your deep navy blue */
            color: #D3D3D3;
            /* Your light gray text */
            padding: 20px;
            font-size: 12px;
        }

        h1,
        h2 {
            font-family: 'Press Start 2P', monospace;
            color: #fff;
            text-shadow: 3px 3px 0px #000;
            margin-bottom: 20px;
        }

        .stats-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .stat-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #000;
            padding: 10px;
            border: 4px solid #D3D3D3;
            /* Gray accent borders */
        }

        /* Arcade Cabinet Game Box Wrapper */
        #game-box {
            width: 400px;
            height: 400px;
            margin: 20px auto;
            position: relative;
            overflow: hidden;
            background-color: #111;
            /* 8-bit chunky frame using your brick red #C0392B */
            border: 8px solid #C0392B;
            box-shadow: 0px 12px 0px #000;

            /* Custom Hammer Cursor Map Layer */
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' style='font-size:24px'><text y='24'>🔨</text></svg>") 4 24, auto;
        }

        /* Changes the hammer rotation position on active mouse click down strike */
        #game-box:active {
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' style='font-size:24px'><text y='24' transform='rotate(-45 12 12)'>🔨</text></svg>") 4 24, auto;
        }

        /* Retro Pop-in Animation */
        @keyframes pixelPop {
            0% {
                transform: scale(0);
            }

            100% {
                transform: scale(1);
            }
        }

        /* Arcade Target Button */
        #click-btn {
            position: absolute;
            padding: 12px 16px;
            background-color: #DC0000;
            /* Your fiery crimson red */
            color: white;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            border: 4px solid #fff;

            /* Inherit arcade hammer cursor layout mechanics from #game-box layer */
            cursor: inherit;

            display: none;
            animation: pixelPop 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 6px 0px #000;
        }

        /* Juice: Physical press indentation mechanics */
        #click-btn:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0px #000;
        }

        /* Menu Start button override using your arcade yellow #F0C020 */
        .nes-btn.custom-start {
            background-color: #F0C020 !important;
            color: #000 !important;
            border-image-source: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="3" height="3"><rect x="1" y="0" width="1" height="1" fill="%23000"/><rect x="0" y="1" width="1" height="1" fill="%23000"/><rect x="2" y="1" width="1" height="1" fill="%23000"/><rect x="1" y="2" width="1" height="1" fill="%23000"/></svg>') !important;
            cursor: pointer;
        }

        .leaderboard-box {
            max-width: 400px;
            margin: 30px auto;
            background-color: #111 !important;
            text-align: left;
            border: 4px solid #D3D3D3 !important;
        }

        /* Match leaderboard box heading wrapper to body navy background */
        .leaderboard-box .title {
            background-color: #00194C !important;
            color: #fff !important;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px dashed #D3D3D3;
            padding: 10px 0;
        }

        .leaderboard-item:last-child {
            border-bottom: none;
        }

        .icon-vertical-align {
            vertical-align: middle;
            display: inline-flex;
            align-items: center;
        }

        /* --- JUICE ANIMATIONS --- */

        /* Screen Shake Effect */
        .shake-cabinet {
            animation: cabinetVibrate 0.15s linear;
        }

        @keyframes cabinetVibrate {
            0% {
                transform: translate(2px, 1px) rotate(0deg);
            }

            10% {
                transform: translate(-1px, -2px) rotate(-1deg);
            }

            20% {
                transform: translate(-3px, 0px) rotate(1deg);
            }

            30% {
                transform: translate(0px, 2px) rotate(0deg);
            }

            40% {
                transform: translate(1px, -1px) rotate(1deg);
            }

            50% {
                transform: translate(-1px, 2px) rotate(-1deg);
            }

            60% {
                transform: translate(-3px, 1px) rotate(0deg);
            }

            70% {
                transform: translate(2px, 1px) rotate(-1deg);
            }

            80% {
                transform: translate(-1px, -1px) rotate(1deg);
            }

            90% {
                transform: translate(2px, 2px) rotate(0deg);
            }

            100% {
                transform: translate(1px, -2px) rotate(0deg);
            }
        }

        /* Floating "SMASH!" Text Particle */
        .smash-particle {
            position: absolute;
            color: #F0C020;
            /* Arcade Gold */
            font-size: 14px;
            font-weight: bold;
            text-shadow: 2px 2px 0px #000;
            pointer-events: none;
            /* Stops text from blocking clicks */
            animation: floatUpAndFade 0.4s ease-out forwards;
            z-index: 99;
        }

        @keyframes floatUpAndFade {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }

            100% {
                transform: translateY(-40px) scale(0.8);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <h1><i data-lucide="gamepad-2" class="icon-vertical-align"></i> WHACK-A-JAMES </h1>

    <div class="stats-container">
        <div class="stat-badge">
            <i data-lucide="target"></i>
            <span>SCORE:<span id="score-val">0</span></span>
        </div>
        <div class="stat-badge">
            <i data-lucide="timer"></i>
            <span>TIME:<span id="time-val">10</span>s</span>
        </div>
    </div>

    <div id="game-box" class="nes-container">
        <button id="start-btn" class="nes-btn custom-start" style="margin-top: 160px;" onclick="startGame()">
            <i data-lucide="play" class="icon-vertical-align"></i> START GAME
        </button>
        <button id="click-btn">JAMES VOWLES</button>
    </div>

    <div class="nes-container is-dark with-title leaderboard-box">
        <p class="title"><i data-lucide="trophy" class="icon-vertical-align"></i> TOP 5</p>
        <ul id="leaderboard" style="list-style: none; padding: 0; margin: 0;">
        </ul>
    </div>

    <script>
        let score = 0;
        let timeLeft = 10;
        let gameInterval;
        const startBtn = document.getElementById('start-btn');

        // Wire up original button via addEventListener (not inline onclick)
        document.getElementById('click-btn').addEventListener('click', (e) => scorePoint(e));

        function startGame() {
            score = 0;
            timeLeft = 10;
            document.getElementById('score-val').innerText = score;
            document.getElementById('time-val').innerText = timeLeft;
            startBtn.style.display = 'none';
            document.getElementById('click-btn').style.display = 'block';
            moveButton();

            gameInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('time-val').innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(gameInterval);
                    endGame();
                }
            }, 1000);
        }

        function scorePoint(event) {
            score++;
            document.getElementById('score-val').innerText = score;

            const gameBox = document.getElementById('game-box');
            const currentBtn = document.getElementById('click-btn');

            // 💥 1. TRIGGER CABINET VIBRATION (SCREEN SHAKE)
            gameBox.classList.remove('shake-cabinet');
            void gameBox.offsetWidth; // Force element redraw sequence
            gameBox.classList.add('shake-cabinet');

            // 💥 2. SPAWN FLOATING "SMASH!" TEXT PARTICLE
            if (event && event.clientX && event.clientY) {
                const particle = document.createElement('div');
                particle.className = 'smash-particle';
                particle.innerText = 'SMASH!';

                const rect = gameBox.getBoundingClientRect();
                const x = event.clientX - rect.left - 30; // Centering calculation
                const y = event.clientY - rect.top - 20;

                particle.style.left = `${x}px`;
                particle.style.top = `${y}px`;

                gameBox.appendChild(particle);

                // Sweep element out of document memory tree when done
                setTimeout(() => particle.remove(), 400);
            }

            // 🔄 3. BUILD AND BIND FRESH TARGET NODES
            const clone = currentBtn.cloneNode(true);
            clone.id = 'click-btn'; // Restore id so getElementById keeps working
            currentBtn.parentNode.replaceChild(clone, currentBtn);

            clone.addEventListener('click', (e) => scorePoint(e));
            moveButton(clone);
        }

        function moveButton(targetElement = document.getElementById('click-btn')) {
            const x = Math.random() * (400 - 110);
            const y = Math.random() * (400 - 65);
            targetElement.style.left = `${x}px`;
            targetElement.style.top = `${y}px`;
            targetElement.style.display = 'block';
        }

        async function endGame() {
            const currentClickBtn = document.getElementById('click-btn');
            currentClickBtn.style.display = 'none';
            startBtn.style.display = 'inline-block';
            startBtn.innerHTML = '<i data-lucide="refresh-cw" class="icon-vertical-align"></i> AGAIN?';
            lucide.createIcons();

            const username = prompt(`GAME OVER!\nFINAL SCORE: ${score}\n\nENTER YOUR INITIALS/NAME:`) || "ANON";

            await fetch('/api/scores', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username.toUpperCase(), score })
            });

            loadLeaderboard();
        }

        async function loadLeaderboard() {
            const response = await fetch('/api/scores');
            const data = await response.json();
            const leaderboard = document.getElementById('leaderboard');
            leaderboard.innerHTML = '';

            data.forEach((entry, idx) => {
                leaderboard.innerHTML += `
                    <li class="leaderboard-item">
                        <span>${idx + 1}. ${entry.username}</span> 
                        <span style="color: #F0C020">${entry.score} PTS</span>
                    </li>`;
            });
        }

        window.onload = () => {
            loadLeaderboard();
            lucide.createIcons();
        };
    </script>
</body>

</html>
